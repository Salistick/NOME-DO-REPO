name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      TTSLIVE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'manual' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build EXE
        run: python -m PyInstaller --clean bot_live.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: powershell
        run: iscc /DTTSLiveVersion=$env:TTSLIVE_VERSION installer.iss

      - name: Upload artifact exe
        uses: actions/upload-artifact@v4
        with:
          name: TTSLive-windows-exe
          path: dist/TTSLive.exe

      - name: Upload artifact installer
        uses: actions/upload-artifact@v4
        with:
          name: TTSLive-installer
          path: dist/TTSLiveInstaller.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TTSLive.exe
            dist/TTSLiveInstaller.exe
          generate_release_notes: true
